deployment_type: docker
assigned_username: justinkumpe
vm_hostname: dev-sandbox
domains:
  - sandbox.dev.kumpe.app
docker_compose: |
  services:
    web:
      image: myapp:latest
      ports:
        - "3000:3000"
      environment:
        NODE_ENV: development
        DATABASE_URL: mysql://user:pass@db:3306/mydb
caddy:
  sandbox.conf: |
    sandbox.dev.kumpe.app {
      reverse_proxy localhost:3000
    }
env_mappings:
  DATABASE_PASSWORD: DB_PASSWORD_SECRET
deploy_rules:
  - environment: dev
    branches:
      include: [develop, main]
      exclude: []